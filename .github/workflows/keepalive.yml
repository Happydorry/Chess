name: keep-alive

# Render's free tier puts the server to sleep after ~15 minutes of inactivity,
# which causes a slow cold start (and a burst of failed connections) for the
# next visitor. This workflow pings the server every ~10 minutes so it stays
# awake. You can also run it manually from the Actions tab.
#
# Note: GitHub may disable scheduled workflows after 60 days with no repo
# activity, and cron runs can be delayed under load — so for maximum
# reliability, pair this with an external uptime monitor (e.g. UptimeRobot).

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server to keep it awake
        run: |
          curl -fsS --max-time 90 https://chess-az23.onrender.com/ > /dev/null \
            && echo "pinged ok" \
            || echo "ping failed (server may be cold-starting)"
